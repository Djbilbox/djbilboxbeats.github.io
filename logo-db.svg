<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3d54;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff1744;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="90" fill="#0a0a0f"/>

  <!-- D letter -->
  <g font-family="Rajdhani, sans-serif" font-weight="700" font-size="72" fill="#ff3d54" letter-spacing="-2">
    <text x="35" y="125" dominant-baseline="middle">D</text>
  </g>

  <!-- B letter -->
  <g font-family="Rajdhani, sans-serif" font-weight="700" font-size="72" fill="#ff3d54" letter-spacing="-2">
    <text x="105" y="125" dominant-baseline="middle">B</text>
  </g>

  <!-- Accent line (music vibe) -->
  <line x1="40" y1="160" x2="160" y2="160" stroke="#ff3d54" stroke-width="2" opacity="0.6"/>

  <!-- Small music note accent -->
  <g fill="#ff3d54" opacity="0.8">
    <circle cx="170" cy="50" r="4"/>
    <path d="M 172 45 Q 175 30 180 25" stroke="#ff3d54" stroke-width="1.5" fill="none"/>
  </g>
</svg>
