<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#cc9900;stop-opacity:0.6" />
    </linearGradient>
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff5555;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ff2d2d;stop-opacity:0" />
    </radialGradient>
    <filter id="monumentGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#sandGrad)"/>

  <!-- Sky glow (red/orange oriental) -->
  <circle cx="600" cy="200" r="400" fill="url(#glowRed)" opacity="0.6"/>

  <!-- LEFT TOWER (gold arches) -->
  <g filter="url(#monumentGlow)">
    <!-- Base pyramid -->
    <polygon points="150,600 50,350 250,350" fill="#cc9900" opacity="0.8"/>
    <polygon points="50,350 250,350 300,600" fill="#aa7700" opacity="0.9"/>

    <!-- Arched tower -->
    <rect x="80" y="280" width="140" height="320" fill="#996600" opacity="0.7"/>
    <path d="M 100 280 Q 150 220 200 280" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.8"/>
    <path d="M 100 340 Q 150 280 200 340" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
    <path d="M 100 400 Q 150 340 200 400" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.6"/>

    <!-- Gold accent vertical -->
    <rect x="145" y="280" width="10" height="320" fill="url(#goldGrad)" opacity="0.9"/>
  </g>

  <!-- CENTER MONUMENT (DJBILBOX) -->
  <g filter="url(#monumentGlow)">
    <!-- Main central structure -->
    <polygon points="600,750 400,450 800,450" fill="#8B4513" opacity="0.9"/>
    <rect x="420" y="450" width="360" height="300" fill="#654321" opacity="0.85"/>

    <!-- Central dome/arch -->
    <path d="M 420 450 Q 600 300 780 450" fill="#cc9900" opacity="0.8" stroke="#ffd700" stroke-width="2"/>

    <!-- Entrance gate -->
    <rect x="520" y="480" width="160" height="200" fill="#333333" opacity="0.9"/>
    <path d="M 520 480 Q 600 400 680 480" fill="#8B4513" opacity="0.7" stroke="#ffd700" stroke-width="2"/>

    <!-- Golden frame entrance -->
    <rect x="518" y="478" width="164" height="204" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.8"/>

    <!-- DJBILBOX text inside -->
    <text x="600" y="560" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="#ff2d2d" text-anchor="middle" opacity="0.9" letter-spacing="2">DJBILBOX</text>

    <!-- Gold pillars on sides -->
    <rect x="380" y="500" width="20" height="250" fill="url(#goldGrad)" opacity="0.9"/>
    <rect x="800" y="500" width="20" height="250" fill="url(#goldGrad)" opacity="0.9"/>

    <!-- Red accent lights (windows) -->
    <circle cx="470" cy="550" r="8" fill="#ff2d2d" opacity="0.8" filter="url(#monumentGlow)"/>
    <circle cx="730" cy="550" r="8" fill="#ff2d2d" opacity="0.8" filter="url(#monumentGlow)"/>
    <circle cx="470" cy="650" r="8" fill="#ff2d2d" opacity="0.8" filter="url(#monumentGlow)"/>
    <circle cx="730" cy="650" r="8" fill="#ff2d2d" opacity="0.8" filter="url(#monumentGlow)"/>
  </g>

  <!-- RIGHT TOWER (mirror of left) -->
  <g filter="url(#monumentGlow)">
    <!-- Base pyramid -->
    <polygon points="1050,600 950,350 1150,350" fill="#cc9900" opacity="0.8"/>
    <polygon points="950,350 1150,350 900,600" fill="#aa7700" opacity="0.9"/>

    <!-- Arched tower -->
    <rect x="980" y="280" width="140" height="320" fill="#996600" opacity="0.7"/>
    <path d="M 1000 280 Q 1050 220 1100 280" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.8"/>
    <path d="M 1000 340 Q 1050 280 1100 340" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
    <path d="M 1000 400 Q 1050 340 1100 400" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.6"/>

    <!-- Gold accent vertical -->
    <rect x="1045" y="280" width="10" height="320" fill="url(#goldGrad)" opacity="0.9"/>
  </g>

  <!-- Sand dunes (foreground) -->
  <path d="M 0 650 Q 300 600 600 650 T 1200 650 L 1200 800 L 0 800 Z" fill="#2a2a1a" opacity="0.6"/>
  <path d="M 0 700 Q 400 650 800 700 T 1200 700 L 1200 800 L 0 800 Z" fill="#1a1a0a" opacity="0.7"/>

  <!-- Atmospheric glow (top) -->
  <rect width="1200" height="100" fill="url(#sandGrad)" opacity="0.3"/>
</svg>
