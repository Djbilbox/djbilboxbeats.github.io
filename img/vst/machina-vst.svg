<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a2f5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2f8e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7a3cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a2f5c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#grad1)"/>

  <!-- Vending Machine Body -->
  <rect x="30" y="20" width="240" height="360" rx="10" fill="#1a1a2e" stroke="#ff2f8e" stroke-width="3"/>

  <!-- Screen/Display -->
  <rect x="50" y="40" width="200" height="120" rx="5" fill="#0a0a0a" stroke="#7a3cff" stroke-width="2"/>

  <!-- Neon Text on Screen -->
  <text x="150" y="85" font-family="Courier New" font-size="24" font-weight="bold" text-anchor="middle" fill="#ff2f8e">MACHINA</text>
  <text x="150" y="110" font-family="Courier New" font-size="12" text-anchor="middle" fill="#39ff5a">EFFECT ENGINE</text>

  <!-- Slots/Compartments -->
  <circle cx="80" cy="190" r="25" fill="#2a2a4a" stroke="#ffd24a" stroke-width="2"/>
  <circle cx="150" cy="190" r="25" fill="#2a2a4a" stroke="#ffd24a" stroke-width="2"/>
  <circle cx="220" cy="190" r="25" fill="#2a2a4a" stroke="#ffd24a" stroke-width="2"/>

  <!-- Icons in slots -->
  <text x="80" y="200" font-size="20" text-anchor="middle" text-anchor="middle">🔊</text>
  <text x="150" y="200" font-size="20" text-anchor="middle">⚙️</text>
  <text x="220" y="200" font-size="20" text-anchor="middle">✨</text>

  <!-- Dispenser area -->
  <rect x="60" y="260" width="180" height="80" rx="5" fill="#1a1a3a" stroke="#7a3cff" stroke-width="2"/>
  <text x="150" y="295" font-family="Courier New" font-size="16" font-weight="bold" text-anchor="middle" fill="#39ff5a">DISTORTION</text>
  <text x="150" y="315" font-family="Courier New" font-size="16" font-weight="bold" text-anchor="middle" fill="#39ff5a">DELAY • FILTER</text>

  <!-- Neon glow effect -->
  <rect x="30" y="20" width="240" height="360" rx="10" fill="none" stroke="#ff2f8e" stroke-width="1" opacity="0.5"/>
</svg>