<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bundleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#0a0e27"/>

  <!-- Gradient overlay -->
  <rect width="400" height="300" fill="url(#bundleGrad)" opacity="0.15"/>

  <!-- Gift box icon -->
  <g transform="translate(100, 50)">
    <!-- Box -->
    <rect x="30" y="40" width="80" height="70" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <!-- Ribbon horizontal -->
    <line x1="30" y1="75" x2="110" y2="75" stroke="#2ecc71" stroke-width="3"/>
    <!-- Ribbon vertical -->
    <line x1="70" y1="40" x2="70" y2="110" stroke="#2ecc71" stroke-width="3"/>
    <!-- Bow -->
    <circle cx="55" cy="40" r="8" fill="#2ecc71"/>
    <circle cx="85" cy="40" r="8" fill="#2ecc71"/>
    <circle cx="70" cy="40" r="6" fill="#27ae60"/>
  </g>

  <!-- Text -->
  <text x="200" y="180" font-size="32" font-weight="bold" text-anchor="middle" fill="#2ecc71" font-family="Arial">FREE BUNDLE</text>
  <text x="200" y="215" font-size="14" text-anchor="middle" fill="#aaa" font-family="Arial">All 5 VSTs + Oriental Demo</text>
  <text x="200" y="235" font-size="12" text-anchor="middle" fill="#666" font-family="Arial">Download Everything at Once</text>

  <!-- Badge -->
  <circle cx="330" cy="30" r="25" fill="#2ecc71"/>
  <text x="330" y="37" font-size="16" font-weight="bold" text-anchor="middle" fill="#0a0e27" font-family="Arial">🎁</text>
</svg>
