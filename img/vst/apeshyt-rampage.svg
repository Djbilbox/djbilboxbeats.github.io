<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="apeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a4a1f"/>
      <stop offset="0.5" stop-color="#1e2810"/>
      <stop offset="1" stop-color="#0d1207"/>
    </linearGradient>
    <linearGradient id="apeGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d4e157"/>
      <stop offset="1" stop-color="#7cb342"/>
    </linearGradient>
    <filter id="apeShadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#apeBg)"/>
  <!-- splatter texture -->
  <circle cx="60" cy="70" r="30" fill="#4a5d24" opacity="0.4"/>
  <circle cx="340" cy="320" r="45" fill="#4a5d24" opacity="0.35"/>
  <circle cx="330" cy="90" r="22" fill="#5a7030" opacity="0.4"/>
  <!-- top label -->
  <text x="200" y="80" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="url(#apeGold)" text-anchor="middle" filter="url(#apeShadow)">APESHYT</text>
  <text x="200" y="128" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#f5f5dc" text-anchor="middle" filter="url(#apeShadow)">RAMPAGE</text>
  <!-- ape silhouette circle -->
  <circle cx="200" cy="228" r="66" fill="#0d1207" stroke="url(#apeGold)" stroke-width="3"/>
  <text x="200" y="252" font-size="70" text-anchor="middle">🦍</text>
  <!-- bottom label -->
  <rect x="70" y="322" width="260" height="46" rx="6" fill="url(#apeGold)"/>
  <text x="200" y="353" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#1e2810" text-anchor="middle">VST PLUGIN</text>
</svg>
