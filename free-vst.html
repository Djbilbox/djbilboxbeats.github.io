<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Free VST — DJBILBOX BEATS</title>
<meta name="description" content="Info page for a free VST recommended by DJBILBOX BEATS — description, highlights and official download link.">
<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="assets/css/theme.css?v=26071908">
<link rel="stylesheet" href="assets/css/modern-effects.css?v=26071908">
<link rel="stylesheet" href="assets/css/chat.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.pi-wrap{max-width:1000px;margin:0 auto;padding:40px 20px 70px}
.pi-back{display:inline-flex;align-items:center;gap:7px;color:var(--text-3);font-size:.8rem;font-weight:600;margin-bottom:22px;transition:.15s}
.pi-back:hover{color:var(--accent)}
.pi-hero{display:grid;grid-template-columns:minmax(0,340px) 1fr;gap:32px;align-items:center;margin-bottom:20px}
.pi-hero img{width:100%;border-radius:14px;border:1px solid var(--border);box-shadow:0 20px 50px rgba(0,0,0,.5);background:#0d0d16}
.pi-eyebrow{color:var(--accent);font-weight:700;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px}
.pi-title{font-family:var(--font-a);font-size:clamp(1.7rem,5vw,2.7rem);font-weight:700;text-transform:uppercase;line-height:1}
.pi-tags{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
.pi-tag{background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:5px 11px;border-radius:999px}
.pi-lead{color:var(--text-2);font-size:1rem;line-height:1.65;margin:14px 0 22px;max-width:58ch}
.pi-price{font-family:var(--font-a);font-weight:700;font-size:1.5rem;margin-bottom:14px;color:var(--green)}
.pi-cta{display:inline-flex;align-items:center;gap:9px;background:var(--green);color:#fff;font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:.82rem;padding:14px 24px;border-radius:10px;transition:.18s}
.pi-cta:hover{filter:brightness(1.08);transform:translateY(-2px)}
.pi-h2{font-family:var(--font-a);font-size:1.35rem;font-weight:700;text-transform:uppercase;margin:44px 0 18px;padding-bottom:10px;border-bottom:2px solid var(--accent)}
.feat-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.feat{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:18px;transition:.18s}
.feat:hover{border-color:var(--accent);transform:translateY(-3px)}
.feat i{color:var(--accent);font-size:1.3rem;margin-bottom:10px}
.feat h4{font-size:.92rem;font-weight:700;margin-bottom:5px}
.feat p{color:var(--text-3);font-size:.78rem;line-height:1.5}
.pi-note{font-size:.72rem;color:var(--text-4);margin-top:28px;text-align:center;line-height:1.6}
.pi-more{margin-top:20px}
.pi-more a{display:inline-flex;align-items:center;gap:7px;color:var(--text-2);font-size:.8rem;font-weight:600;padding:9px 16px;border:1px solid var(--border);border-radius:8px;transition:.15s}
.pi-more a:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:720px){.pi-hero{grid-template-columns:1fr}}
</style>
</head>
<body data-page="shop">

<main class="pi-wrap" id="piWrap">
  <a href="shop.html" class="pi-back"><i class="fa-solid fa-arrow-left"></i> Back to shop</a>
  <div id="piContent"></div>
</main>

<script src="assets/js/vst-data.js?v=26071911"></script>
<script src="assets/js/free-vst-info.js?v=26071911"></script>
<script src="assets/js/site.js?v=26071901"></script>
<script src="assets/js/chat.js"></script>
<script>
(function(){
  var params = new URLSearchParams(location.search);
  var id = params.get('id');
  var base = (window.VSTS||[]).find(function(v){ return v.id === id; });
  var info = (window.FREE_VST_INFO||{})[id];
  var box = document.getElementById('piContent');

  if(!base || !info){
    box.innerHTML = '<h1 class="pi-title">Plugin not found</h1>'+
      '<p class="pi-lead">This free VST does not exist or has no page yet. '+
      '<a href="shop.html" style="color:var(--accent);font-weight:700">Back to shop</a>.</p>';
    return;
  }

  document.title = base.name.split('—')[0].trim() + ' — Free VST | DJBILBOX BEATS';

  var esc = function(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  var name = base.name.split('—')[0].trim();
  var subtitle = (base.name.split('—')[1]||'').trim();
  var kind = base.sub === 'instrument' ? 'Free synth / instrument'
           : base.sub === 'vocal'      ? 'Free vocoder / talkbox'
           : 'Free effect';

  var tags = (base.tags||[]).map(function(t){ return '<span class="pi-tag">'+esc(t)+'</span>'; }).join('');
  var feats = (info.feats||[]).map(function(f){
    return '<div class="feat"><i class="fa-solid '+f.i+'"></i><h4>'+esc(f.t)+'</h4><p>'+esc(f.d)+'</p></div>';
  }).join('');

  box.innerHTML =
    '<div class="pi-hero">'+
      '<img src="'+base.img+'" alt="'+esc(name)+' VST plugin">'+
      '<div>'+
        '<div class="pi-eyebrow">'+kind+' · recommended by DJBILBOX</div>'+
        '<h1 class="pi-title">'+esc(name)+'</h1>'+
        (subtitle ? '<div class="pi-tags">'+tags+'</div>' : '<div class="pi-tags">'+tags+'</div>')+
        '<p class="pi-lead">'+esc(info.long)+'</p>'+
        '<div class="pi-price">FREE</div>'+
        '<a class="pi-cta" href="'+base.url+'" target="_blank" rel="noopener"><i class="fa-solid fa-download"></i> Download for free</a>'+
      '</div>'+
    '</div>'+
    '<h2 class="pi-h2">Highlights</h2>'+
    '<div class="feat-grid">'+feats+'</div>'+
    '<div class="pi-more">'+
      '<a href="'+base.url+'" target="_blank" rel="noopener"><i class="fa-solid fa-arrow-up-right-from-square"></i> Official site — '+esc(info.dev)+'</a>'+
    '</div>'+
    '<p class="pi-note">'+esc(name)+' is a third-party plugin by '+esc(info.dev)+', which I use and recommend. '+
      'Download it from the developer\'s official website.</p>';
})();
</script>
</body>
</html>
