<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Beats by Region & Genre | DJBILBOX BEATS - Free Production Music</title>
<meta name="description" content="Browse 10,000+ free-for-profit beats organized by region, genre, and mood. Paris, Tokyo, Lagos, New York, São Paulo, and more. Instant download.">
<link rel="canonical" href="https://djbilboxbeats.com/beats-index.html">
<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="assets/css/theme.css?v=26070519">
<link rel="stylesheet" href="assets/css/chat.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.index-hero { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%); padding: 60px 24px; text-align: center; color: #fff; }
.index-hero h1 { font-size: 3rem; font-weight: 700; margin: 0; font-family: var(--font-a); }
.index-hero p { font-size: 1.2rem; margin-top: 12px; }
.index-section { padding: 40px 24px; border-bottom: 1px solid var(--border); }
.index-section h2 { font-size: 1.8rem; font-weight: 700; margin-top: 0; color: var(--accent); }
.index-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
.index-link { background: var(--surface); border: 1px solid var(--border); padding: 12px; text-align: center; border-radius: 8px; color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: .15s; }
.index-link:hover { border-color: var(--accent); transform: translateY(-2px); }
</style>
</head>
<body data-page="beats">

<main>
<div class="index-hero">
  <div class="container">
    <h1>🌍 10,000+ Beats Worldwide</h1>
    <p>Browse all our beats by region, genre, and mood. Free-for-profit, instant download.</p>
  </div>
</div>

<div class="container">

<!-- REGIONS SECTION -->
<div class="index-section">
  <h2>🌏 Beats by Region</h2>
  <p>Find beats from your city or region.</p>
  <div class="index-grid" id="regionsGrid"></div>
</div>

<!-- GENRES SECTION -->
<div class="index-section">
  <h2>🎵 Beats by Genre</h2>
  <p>Browse by music style.</p>
  <div class="index-grid" id="genresGrid"></div>
</div>

<!-- USE CASES SECTION -->
<div class="index-section">
  <h2>📱 Beats by Platform</h2>
  <p>Music for YouTube, TikTok, Twitch, and more.</p>
  <div class="index-grid" id="useCasesGrid"></div>
</div>

</div>
</main>

<script src="assets/js/seo-data.js"></script>
<script src="assets/js/site.js?v=26070519"></script>
<script src="assets/js/chat.js"></script>

<script>
// Populate links for massive internal linking
const REGIONS = ['Paris', 'Tokyo', 'Dubai', 'New York', 'Moscow', 'London', 'Lagos', 'Cairo', 'São Paulo', 'Mexico City', 'Mumbai', 'Bangkok', 'Sydney', 'Toronto', 'Berlin', 'Amsterdam', 'Singapore', 'Istanbul', 'Barcelona', 'Seoul'];
const GENRES = ['Trap', 'Hip-Hop', 'Synthwave', 'Drill', 'Oriental', 'Lo-Fi', 'Reggaeton', 'Amapiano', 'K-Pop', 'House', 'Techno', 'Ambient', 'Grime', 'Afrobeat', 'Soul'];
const USE_CASES = ['YouTube', 'TikTok', 'Twitch', 'Gaming', 'Film', 'Podcast', 'Instagram', 'Commercial'];

function slugify(str) {
  return str.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '');
}

// Regions grid
const regionsGrid = document.getElementById('regionsGrid');
REGIONS.forEach(region => {
  const link = document.createElement('a');
  link.href = `/beats/${slugify('trap')}-${slugify(region)}-${slugify('chill')}.html`;
  link.className = 'index-link';
  link.textContent = region;
  regionsGrid.appendChild(link);
});

// Genres grid
const genresGrid = document.getElementById('genresGrid');
GENRES.forEach(genre => {
  const link = document.createElement('a');
  link.href = `/beats/${slugify(genre)}-${slugify('Paris')}-${slugify('epic')}.html`;
  link.className = 'index-link';
  link.textContent = genre;
  genresGrid.appendChild(link);
});

// Use cases grid
const useCasesGrid = document.getElementById('useCasesGrid');
USE_CASES.forEach(useCase => {
  const link = document.createElement('a');
  link.href = `/beats-generator.html?use=${encodeURIComponent(useCase)}`;
  link.className = 'index-link';
  link.textContent = useCase;
  useCasesGrid.appendChild(link);
});

// Schema markup
const schema = {
  '@context': 'https://schema.org',
  '@type': 'CollectionPage',
  name: '10,000+ Beats Worldwide',
  description: 'Browse free-for-profit beats by region, genre, and mood',
  url: 'https://djbilboxbeats.com/beats-index.html',
  provider: {
    '@type': 'Organization',
    name: 'DJBILBOX BEATS',
    url: 'https://djbilboxbeats.com'
  }
};

const scriptTag = document.createElement('script');
scriptTag.type = 'application/ld+json';
scriptTag.textContent = JSON.stringify(schema);
document.head.appendChild(scriptTag);
</script>
</body>
</html>
