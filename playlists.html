<style>
  .pl-grid{display:grid;gap:22px;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));margin-bottom:48px}
  .pl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;display:flex;flex-direction:column;transition:.2s ease}
  .pl-card:hover{border-color:rgba(255,45,45,.4);box-shadow:0 10px 30px rgba(0,0,0,.12)}
  .pl-embed{position:relative;aspect-ratio:16/9;background:#000}
  .pl-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .pl-info{padding:13px 15px 15px}
  .pl-info h3{font-size:.9rem;font-weight:700;line-height:1.3;margin-bottom:8px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pl-count{display:inline-flex;align-items:center;gap:7px;font-size:.72rem;color:var(--text-3);font-weight:600}
  .pl-count i{color:#ff0000;font-size:.95rem}
</style>
</head>
